<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadowbound</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="img/logo.png" alt="Shadowbound Logo" class="logo">
        </div>
    </header>

    <section class="banner">
        <img src="img/banner.png" alt="Shadowbound Banner" class="banner-image">
        <div class="banner-content">
            <h1>SHADOWBOUND</h1>
            <p class="lore-text">«В сумерках богов души павших героев взывают из Бездны. Ты – Хранитель уз, последняя надежда связать их сущности и противостоять надвигающейся Тьме. Куй свою легенду из эха мёртвых.»</p>
        </div>
    </section>

    <main class="game-panel">
        <section class="character-select">
            <h2>Выберите героя</h2>
            <div class="character-slots">
                <div class="slot locked warrior"></div>
                <div class="slot locked mage"></div>
                <div class="slot active rogue"></div>
            </div>
        </section>

        <div class="character-stats-row">
            <section class="character-view">
                <h2>Снаряжение</h2>
                <div class="model-container">
                    <img src="img/game/characters/rogue/rogue.png" alt="Модель персонажа" class="character-image">
                    <img src="img/game/equipment.png" alt="Слоты снаряжения" class="overlay-image">
                </div>
            </section>

            <section class="character-stats">
                <h2>Характеристики</h2>
                <img src="img/game/characters/rogue/stats-rogue.png">
            </section>
        </div>

        <section class="progress-scale">
            <h2>Уровень развития</h2>
            <img src="img/game/progress.png">
        </section>
    </main>

    <footer>
        <p>© 2026 Shadowbound. Все права защищены.</p>
    </footer>
</body>
</html>
